spring:
  application:
    name: codefest-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/codefest}
    username: ${SPRING_DATASOURCE_USERNAME:codefest}
    password: ${SPRING_DATASOURCE_PASSWORD:codefest}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

hotel:
  holds:
    default-duration: ${HOTEL_HOLD_DURATION:12h}
    confirmation-base-url: ${HOTEL_CONFIRMATION_BASE_URL:http://localhost:5173}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:codefest-dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
